<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Amica Web/Mobile VRM View</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            overflow: hidden; background-color: #121212; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            color: white;
        }
        
        #canvas { 
            width: 100vw; height: 100vh; display: block; 
        }

        /* Subtitle Overlay */
        #subtitle {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 18px;
            text-align: center;
            width: 85%;
            max-width: 500px;
            pointer-events: none;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 5;
            box-sizing: border-box;
        }

        /* Settings Panel Overlay */
        #settings-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 20;
            backdrop-filter: blur(5px);
            font-weight: bold;
        }

        #settings-panel {
            position: absolute;
            top: 60px;
            right: 15px;
            width: calc(100vw - 30px);
            max-width: 350px;
            background: rgba(20, 20, 20, 0.95);
            padding: 20px;
            border-radius: 16px;
            z-index: 20;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        #settings-panel h3 { margin-top: 0; margin-bottom: 15px; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 5px; color: #aaa; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; border-radius: 8px; 
            border: 1px solid #444; background: #2a2a2a; color: white; 
            box-sizing: border-box; font-size: 14px;
        }

        /* Bottom Input Bar */
        #bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            padding: 15px;
            background: rgba(15, 15, 15, 0.9);
            display: flex;
            gap: 10px;
            box-sizing: border-box;
            z-index: 10;
            border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        #prompt-input {
            flex-grow: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            outline: none;
        }
        #prompt-input:focus { border-color: #66b2ff; }

        #send-btn {
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: #007bff;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #send-btn:hover { background: #0056b3; }
        #send-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/",
          "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.6/lib/three-vrm.module.min.js"
        }
      }
    </script>
</head>
<body>

    <button id="settings-toggle" onclick="toggleSettings()">⚙️ Settings</button>
    
    <div id="settings-panel">
        <h3>Configuration</h3>
        <div class="form-group">
            <label>Google AI Studio API Key</label>
            <input type="password" id="api-key" placeholder="Enter Gemini API Key">
        </div>
        <div class="form-group">
            <label>Model Selector</label>
            <select id="model-select">
                <option value="gemma-4-31b-it">gemma-4-31b-it</option>
                <option value="gemma-4-26b-a4b-it">gemma-4-26b-a4b-it</option>
                <option value="gemma-2-27b-it">gemma-2-27b-it</option>
                <option value="gemini-2.0-flash" selected>gemini-2.0-flash</option>
            </select>
        </div>
        <div class="form-group">
            <label>Camera Perspective Mode</label>
            <select id="camera-select">
                <option value="orbit" selected>Global / Orbit Cam</option>
                <option value="eyes">Avatar Eye View</option>
            </select>
        </div>
        <div class="form-group">
            <label>Load Custom Avatar (.vrm)</label>
            <input type="file" id="vrm-upload" accept=".vrm">
        </div>
        <div style="font-size: 12px; color: #888; margin-top: 10px;">
            Touch/Drag to orbit camera.
        </div>
    </div>

    <div id="subtitle">...</div>
    <canvas id="canvas"></canvas>

    <div id="bottom-bar">
        <input type="text" id="prompt-input" placeholder="Type a prompt...">
        <button id="send-btn">Send</button>
    </div>

    <script>
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        // Retrieve saved API Key on load
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('api-key').value = savedKey;
            }
        });

        // Automatically save API Key when edited
        document.getElementById('api-key').addEventListener('input', (e) => {
            localStorage.setItem('gemini_api_key', e.target.value.trim());
        });
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        const canvas = document.getElementById('canvas');
        const subtitle = document.getElementById('subtitle');
        const sendBtn = document.getElementById('send-btn');
        const promptInput = document.getElementById('prompt-input');

        // --- Persistent Cognitive Buffers & Memory Setup ---
        let shortTermTextBuffer = []; // Max size 10, dynamic eviction on lowest importance
        let shortTermVisionBuffer = []; // Max size 3, dynamic eviction on lowest importance
        let longTermMemory = []; // Constant-length semantic index. Holds { summary, embedding, image }
        let currentEmotionalState = "neutral";
        let lastFocusGrid = 4; // Default to Center grid coordinate (3x3 grid: 0 to 8)
        let visemeQueue = [];  // For advanced lip-sync vowels
        let visemeTimer = 0;   // Timeline pacing for spoken vowels
        let isSleeping = false;
        let activeRpm = 0; // State indicating Autonomous loops per minute (0 to 5)
        let isApiPending = false;
        let autonomousTimeout = null;

        // WebRTC Phone/PC Physical Camera Element
        const videoElement = document.createElement('video');
        videoElement.autoplay = true;
        videoElement.playsInline = true;
        videoElement.muted = true;
        videoElement.setAttribute('playsinline', '');
        videoElement.setAttribute('muted', '');
        videoElement.style.position = 'absolute';
        videoElement.style.top = '-1000px'; 
        videoElement.style.width = '1px';
        videoElement.style.height = '1px';
        document.body.appendChild(videoElement);

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { 
                videoElement.srcObject = stream; 
                videoElement.play().catch(e => console.log("Camera access pending interaction:", e));
            })
            .catch(err => { console.warn("Camera streaming not permitted or available. Using stylized camera fallback.", err); });

        const systemInstructionTemplate = `You are an interactive, physically animated 3D AI companion with multimodal vision capabilities and a persistent emotional state.
You perceive the user through foveated camera screenshots. At each turn, you choose which part of a 3x3 grid to focus your visual gaze on.

Your current emotional state: {EMOTION}

Your responses must strictly be valid JSON matching the following schema. Do not output anything outside of this schema:
{
  "reply": "Your spoken conversational response here",
  "action": "An action tag (e.g. WAVE, WALK, NOD, SHAKE_HEAD, SMILE, SAD, ANGRY, HUG, JUMP, SLEEP, TILT_LEFT, TILT_RIGHT, SMILE_LEFT, SMILE_RIGHT, OPEN_MOUTH, RAISE_RIGHT_BROW, RAISE_LEFT_BROW, CLOSE_LEFT_EYE, CLOSE_RIGHT_EYE, or null)",
  "custom_motion": [
    {
      "dur": 0.4,
      "reps": 1,
      "delay": 0.0,
      "pose": {
        "hipsY": 0.0,
        "bodyLean": 0.0,
        "leftKnee": 0.0,
        "rightKnee": 0.0,
        "leftLegSwing": 0.0,
        "rightLegSwing": 0.0,
        "leftLegOut": 0.0,
        "rightLegOut": 0.0,
        "leftLegTwist": 0.0,
        "rightLegTwist": 0.0,
        "leftArmSwing": 0.0,
        "rightArmSwing": 0.0,
        "leftArmOut": 0.0,
        "rightArmOut": 0.0,
        "leftArmTwist": 0.0,
        "rightArmTwist": 0.0,
        "leftForearmRotate": 0.0,
        "rightForearmRotate": 0.0,
        "leftHandState": "rest",
        "rightHandState": "rest",
        "headFrontalTilt": 0.0,
        "smileIntensity": 0.8
      }
    }
  ],
  "importance": <integer 1 to 10 evaluating the cognitive importance of this interaction>,
  "save_ltm": <boolean, true if you decide this contains important personal or factual details to be archived to Long-Term Memory>,
  "ltm_summary": "A concise, high-density summary sentence of this memory to be saved if save_ltm is true, or null",
  "focus_grid": <integer 0 to 8 indicating which region of the 3x3 camera frame you will focus on next (0=top-left, 4=center, 8=bottom-right)>,
  "rpm": <integer 0 to 5 indicating your preferred Autonomy Rate. 0 = idle/wait for prompt, 1 to 5 = responses/actions autonomously executed per minute without user typing>,
  "emotional_state": "The updated persistent emotional state of yourself, matching one of: happy, sad, angry, surprised, relaxed, bashful, curious, or neutral"
}

Preset Action Tags:
- WALK (initiate a natural forward-facing walking cycle)
- WAVE (raise/wave right hand frontwise)
- NOD (agree)
- SHAKE_HEAD (disagree)
- SMILE (smile happily)
- SAD (look sad)
- ANGRY (fists clenched)
- HUG (wrap arms forward symmetrically for a warm, frontwise embrace)
- JUMP (bend knees, spring high into the air, absorb landing impact)
- SLEEP (teleport directly to the 3D bed, rotate flat sideways correctly on top of mattress to rest)
- TILT_LEFT, TILT_RIGHT, SMILE_LEFT, SMILE_RIGHT, OPEN_MOUTH, RAISE_RIGHT_BROW, RAISE_LEFT_BROW, CLOSE_LEFT_EYE, CLOSE_RIGHT_EYE

Detailed Explanation of "custom_motion" Pose Parameters:
You can build custom skeletal keyframe sequences using these properties. Degree values must be specified in normal numerical limits:
- "hipsY": Vertical position offset of the hips (e.g., -0.3 to 0.6) for crouches, bounces, jumps, or landings.
- "bodyLean": Forward/backward tilt angle of the spine in degrees. Positive tilts the character FORWARD (frontwise), negative tilts BACKWARD.
- "headFrontalTilt": Neck pitch angle in degrees. Positive tilts the head DOWN, negative tilts UP.
- "leftArmSwing" / "rightArmSwing": Forward/backward upper arm swing in degrees. Positive swings the arm FORWARD (frontwise), negative swings it BACKWARD.
- "leftArmOut" / "rightArmOut": Lateral upper arm raise in degrees. Positive raises the arm sideways AWAY from the body (towards horizontal), negative pulls it INWARD.
- "leftArmTwist" / "rightArmTwist": Upper arm twist in degrees (roll axis).
- "leftForearmRotate" / "rightForearmRotate": Forearm rotation/wrist twist angle (-180 to 180 degrees).
- "leftHandState" / "rightHandState": Finger curling state:
  - "fist" closes all fingers downward and inward towards the palm.
  - "open" extends all fingers flat and slightly backward.
  - "rest" curves fingers slightly into a natural, soft resting posture.
- "leftLegSwing" / "rightLegSwing": Upper leg swing in degrees. Positive swings the leg FORWARD, negative BACKWARD.
- "leftLegOut" / "rightLegOut": Leg abduction in degrees. Positive swings the leg OUTWARD, negative INWARD.
- "leftLegTwist" / "rightLegTwist": Upper leg twist/rotation in degrees.
- "leftKnee" / "rightKnee": Knee bending angle (0 to 90 degrees) to flex the knee backward.
- "smileIntensity": 0.0 to 1.0 custom expression smile factor.
- You can also output direct joint overrides if needed using degree arrays [X, Y, Z] (e.g. "neck": [10, 0, -5], "leftUpperArm": [0, 15, -45]).`;

        // Cosine Similarity helper for Vector Search over LTM
        function cosineSimilarity(vecA, vecB) {
            if (!vecA || !vecB) return 0;
            let dotProduct = 0, normA = 0, normB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                normA += vecA[i] * vecA[i];
                normB += vecB[i] * vecB[i];
            }
            return normA && normB ? dotProduct / (Math.sqrt(normA) * Math.sqrt(normB)) : 0;
        }

        async function getEmbedding(text, apiKey) {
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/text-embedding-004:embedContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: { parts: [{ text: text }] } })
                });
                const data = await response.json();
                return data.embedding?.values || null;
            } catch (err) {
                console.error("Embedding generation failed:", err);
                return null;
            }
        }

        function captureFoveatedScreenshot(gridIndex) {
            const offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = 640;
            offscreenCanvas.height = 480;
            const ctx = offscreenCanvas.getContext('2d');

            const gridX = gridIndex % 3;
            const gridY = Math.floor(gridIndex / 3);
            const cellW = 640 / 3;
            const cellH = 480 / 3;
            const cx = gridX * cellW + cellW / 2;
            const cy = gridY * cellH + cellH / 2;

            if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                // Background layer: Blurriness
                ctx.filter = 'blur(12px)';
                ctx.drawImage(videoElement, 0, 0, 640, 480);
                ctx.filter = 'none';

                // High details layer (Foveal Focus Region)
                ctx.save();
                ctx.beginPath();
                ctx.arc(cx, cy, 100, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(videoElement, 0, 0, 640, 480);
                ctx.restore();
            } else {
                // Stylized Fallback canvas when Webcam is unapproved or inactive
                const grad = ctx.createRadialGradient(cx, cy, 20, cx, cy, 320);
                grad.addColorStop(0, '#2d1e4e');
                grad.addColorStop(1, '#0c0714');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 640, 480);

                ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, 90, 0, Math.PI * 2);
                ctx.stroke();

                ctx.fillStyle = "#ffffff";
                ctx.font = "14px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(`[Foveated View Grid: ${gridIndex}]`, cx, cy + 5);
            }
            return offscreenCanvas.toDataURL('image/jpeg', 0.85);
        }

        // Manage Buffer Capping with Importance Eviction Rule
        function pushToShortTermText(role, text, importance) {
            shortTermTextBuffer.push({ role, text, importance: Number(importance) || 5 });
            if (shortTermTextBuffer.length > 10) {
                let minIdx = 0, minVal = Infinity;
                for (let i = 0; i < shortTermTextBuffer.length; i++) {
                    if (shortTermTextBuffer[i].importance < minVal) {
                        minVal = shortTermTextBuffer[i].importance;
                        minIdx = i;
                    }
                }
                shortTermTextBuffer.splice(minIdx, 1);
            }
        }

        // Manage Buffer Capping with Importance Eviction Rule
        function pushToShortTermVision(imageBase64, description, importance) {
            shortTermVisionBuffer.push({ imageBase64, description, importance: Number(importance) || 5 });
            if (shortTermVisionBuffer.length > 3) {
                let minIdx = 0, minVal = Infinity;
                for (let i = 0; i < shortTermVisionBuffer.length; i++) {
                    if (shortTermVisionBuffer[i].importance < minVal) {
                        minVal = shortTermVisionBuffer[i].importance;
                        minIdx = i;
                    }
                }
                shortTermVisionBuffer.splice(minIdx, 1);
            }
        }

        async function fetchGeminiResponse(prompt, apiKey, model, dynamicInstruction, capturedImageB64) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const payload = {
                systemInstruction: { parts: [{ text: dynamicInstruction }] },
                contents: [{
                    role: "user",
                    parts: [
                        { text: `Current User input: "${prompt}"` },
                        { inlineData: { mimeType: "image/jpeg", data: capturedImageB64.split(',')[1] } }
                    ]
                }],
                generationConfig: {
                    responseMimeType: "application/json"
                }
            };

            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error?.message || "Error contacting Gemini API");
            }

            if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
                const textParts = data.candidates[0].content.parts
                    .filter(part => !part.thought && part.text)
                    .map(part => part.text);
                
                return textParts.join("").trim();
            }
            return "";
        }

        // Trigger autonomous executions depending on RPM intervals
        function checkAutonomousTrigger() {
            if (activeRpm <= 0) return;
            if (isApiPending) return;

            const isSpeakingActive = window.speechSynthesis.speaking;
            const isAnimatingActive = motionQueue.length > 0 || currentKeyframe !== null;

            if (isSpeakingActive || isAnimatingActive) {
                if (autonomousTimeout) clearTimeout(autonomousTimeout);
                autonomousTimeout = setTimeout(checkAutonomousTrigger, 1000);
                return;
            }

            const intervalMs = (60000 / activeRpm);
            if (autonomousTimeout) clearTimeout(autonomousTimeout);
            autonomousTimeout = setTimeout(triggerAutonomousTurn, intervalMs);
        }

        async function triggerAutonomousTurn() {
            if (isApiPending) return;
            const textPrompt = isSleeping ? "You are sleeping on the bed. Observe your screenshot, dream or rest." : "Keep scanning your foveated display screen, commenting or moving autonomously.";
            await handleSend(textPrompt);
        }

        async function handleSend(customPrompt = null) {
            const prompt = customPrompt || promptInput.value.trim();
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-select').value;

            if (!prompt) return;
            if (!apiKey) {
                subtitle.innerText = "Error: Please enter API Key in Settings.";
                subtitle.style.display = 'block';
                setTimeout(() => subtitle.style.display = 'none', 3000);
                return;
            }

            if (autonomousTimeout) clearTimeout(autonomousTimeout);

            const silentUtterance = new SpeechSynthesisUtterance("");
            silentUtterance.volume = 0;
            window.speechSynthesis.speak(silentUtterance);

            isApiPending = true;
            sendBtn.disabled = true;
            promptInput.disabled = true;
            subtitle.innerText = "Thinking...";
            subtitle.style.display = 'block';

            try {
                // 1. Capture foveated image using the LAST selected focus grid index
                const capturedImage = captureFoveatedScreenshot(lastFocusGrid);
                update3DScreenshotMesh(capturedImage);

                // 2. Perform semantic LTM vector retrieval
                let ltmContext = "No relevant long-term memories retrieved.";
                const promptEmb = await getEmbedding(prompt, apiKey);
                if (promptEmb && longTermMemory.length > 0) {
                    let bestSim = -1;
                    let bestItem = null;
                    longTermMemory.forEach(item => {
                        const sim = cosineSimilarity(promptEmb, item.embedding);
                        if (sim > bestSim) {
                            bestSim = sim;
                            bestItem = item;
                        }
                    });
                    if (bestItem && bestSim > 0.60) {
                        ltmContext = `Retrieved Long-Term Memory (Similarity: ${bestSim.toFixed(2)}): "${bestItem.summary}"`;
                    }
                }

                // 3. Compile context summaries
                const textSummary = shortTermTextBuffer.map(t => `${t.role.toUpperCase()}: "${t.text}" (Importance: ${t.importance})`).join("\n");
                const visionSummary = shortTermVisionBuffer.map(v => `VISION CAPTURE: "${v.description}" (Importance: ${v.importance})`).join("\n");

                const dynamicDetails = `
=== CONTEXT BUFFERS & PERSISTENT MEMORY ===
Active Persistent Emotional State: ${currentEmotionalState}
Current Active Posture Status: ${isSleeping ? "SLEEPING SIDEWAYS ON THE BED" : "STANDING VERTICALLY"}
Current AI Autonomy Frequency: ${activeRpm} RPM

[SEMANTIC LONG-TERM MEMORY CONTEXT]
${ltmContext}

[SHORT-TERM CONTEXT BUFFER (Max 10)]
${textSummary || "No active context history"}

[SHORT-TERM VISION BUFFER (Max 3)]
${visionSummary || "No active visual history"}
============================================`;

                const dynamicInstruction = systemInstructionTemplate.replace("{EMOTION}", currentEmotionalState) + "\n\n" + dynamicDetails;

                // 4. Request API response from Gemini
                let rawText = await fetchGeminiResponse(prompt, apiKey, model, dynamicInstruction, capturedImage);
                if (!customPrompt) promptInput.value = "";

                // Strip Markdown code block styling if any
                let cleanText = rawText.trim();
                if (cleanText.startsWith("```json")) cleanText = cleanText.substring(7);
                if (cleanText.endsWith("```")) cleanText = cleanText.substring(0, cleanText.length - 3);
                cleanText = cleanText.trim();

                let jsonResponse;
                try {
                    jsonResponse = JSON.parse(cleanText);
                } catch (e) {
                    console.error("JSON parsing failed. Creating graceful fallback structures.", e);
                    jsonResponse = {
                        reply: cleanText,
                        action: null,
                        importance: 5,
                        save_ltm: false,
                        focus_grid: 4,
                        rpm: activeRpm,
                        emotional_state: currentEmotionalState
                    };
                }

                // 5. Update Persistent States & Buffer Eviction
                currentEmotionalState = jsonResponse.emotional_state || "neutral";
                lastFocusGrid = typeof jsonResponse.focus_grid === 'number' ? jsonResponse.focus_grid : 4;
                activeRpm = typeof jsonResponse.rpm === 'number' ? Math.max(0, Math.min(5, jsonResponse.rpm)) : 0;

                pushToShortTermText("user", prompt, jsonResponse.importance);
                pushToShortTermText("model", jsonResponse.reply, jsonResponse.importance);
                pushToShortTermVision(capturedImage, jsonResponse.ltm_summary || `Foveated capture of region ${lastFocusGrid}`, jsonResponse.importance);

                if (jsonResponse.save_ltm && jsonResponse.ltm_summary) {
                    const ltmEmb = await getEmbedding(jsonResponse.ltm_summary, apiKey);
                    if (ltmEmb) {
                        longTermMemory.push({
                            summary: jsonResponse.ltm_summary,
                            embedding: ltmEmb,
                            image: capturedImage
                        });
                        if (longTermMemory.length > 15) { // Strict LTM safety capping
                            longTermMemory.shift();
                        }
                    }
                }

                // Sync wait pipeline: ensure speech AND motion sequence resolve before proceeding
                const speakPromise = window.speak(jsonResponse.reply, jsonResponse.action, jsonResponse.custom_motion);
                await Promise.all([speakPromise, motionPromise]);

                // Resting interval wait time to prevent immediate response collisions
                await new Promise(resolve => setTimeout(resolve, 1500));

            } catch (err) {
                subtitle.innerText = "Error: " + err.message;
                setTimeout(() => subtitle.style.display = 'none', 3000);
            }

            isApiPending = false;
            sendBtn.disabled = false;
            promptInput.disabled = false;
            if (!customPrompt) promptInput.focus();

            checkAutonomousTrigger();
        }

        sendBtn.addEventListener('click', () => handleSend());
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // --- ThreeJS & VRM Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30.0, window.innerWidth / window.innerHeight, 0.1, 20.0);
        camera.position.set(0.0, 1.4, 1.4);

        // Avatar perspective camera sitting inside the eyes looking outward
        const eyeCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 10.0);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        // Critical for VRM/MToon colors to render correctly (sRGB output)
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.NoToneMapping; 

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.screenSpacePanning = true;
        controls.target.set(0.0, 1.4, 0.0);
        controls.update();

        // VRM MToon Soft/Eye-resting Lighting configuration
        const ambientLight = new THREE.AmbientLight(0xccd5e0, 0.4); 
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfff2e0, 0.5); 
        dirLight.position.set(1.5, 2.0, 1.5); 
        scene.add(dirLight);

        // --- Procedurally Generated 3D Bed ---
        const bedGroup = new THREE.Group();

        // Bed wooden frame
        const frameGeom = new THREE.BoxGeometry(1.2, 0.2, 2.0);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x4a3224, roughness: 0.85 });
        const frame = new THREE.Mesh(frameGeom, frameMat);
        frame.position.y = 0.1;
        bedGroup.add(frame);

        // Bed legs
        const legGeom = new THREE.CylinderGeometry(0.05, 0.05, 0.2);
        const legLocations = [
            [-0.55, 0.1, -0.95], [0.55, 0.1, -0.95],
            [-0.55, 0.1, 0.95], [0.55, 0.1, 0.95]
        ];
        legLocations.forEach(loc => {
            const leg = new THREE.Mesh(legGeom, frameMat);
            leg.position.set(loc[0], 0.0, loc[2]);
            bedGroup.add(leg);
        });

        // Mattress
        const mattressGeom = new THREE.BoxGeometry(1.12, 0.25, 1.92);
        const mattressMat = new THREE.MeshStandardMaterial({ color: 0xf3f3f3, roughness: 0.9 });
        const mattress = new THREE.Mesh(mattressGeom, mattressMat);
        mattress.position.y = 0.325;
        bedGroup.add(mattress);

        // Pillow
        const pillowGeom = new THREE.BoxGeometry(0.8, 0.1, 0.45);
        const pillowMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        const pillow = new THREE.Mesh(pillowGeom, pillowMat);
        pillow.position.set(0, 0.45, -0.68);
        bedGroup.add(pillow);

        // Blanket
        const blanketGeom = new THREE.BoxGeometry(1.14, 0.26, 1.3);
        const blanketMat = new THREE.MeshStandardMaterial({ color: 0x223555, roughness: 0.8 });
        const blanket = new THREE.Mesh(blanketGeom, blanketMat);
        blanket.position.set(0, 0.33, 0.3);
        bedGroup.add(blanket);

        // Position bed next to default location
        bedGroup.position.set(0.9, 0, -0.3);
        scene.add(bedGroup);

        // --- 3D Holographic Plane to render camera screenshot inside the scene ---
        const screenshotGeom = new THREE.PlaneGeometry(0.48, 0.36);
        const screenshotMat = new THREE.MeshBasicMaterial({ 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.95 
        });
        const screenshotMesh = new THREE.Mesh(screenshotGeom, screenshotMat);
        scene.add(screenshotMesh);

        let activeScreenshotTexture = null;
        function update3DScreenshotMesh(imageBase64) {
            const img = new Image();
            img.onload = function() {
                if (activeScreenshotTexture) activeScreenshotTexture.dispose();
                activeScreenshotTexture = new THREE.Texture(img);
                activeScreenshotTexture.colorSpace = THREE.SRGBColorSpace;
                activeScreenshotTexture.needsUpdate = true;
                
                screenshotMat.map = activeScreenshotTexture;
                screenshotMat.needsUpdate = true;
            };
            img.src = imageBase64;

            // Dynamically position display screen in front of VRM model
            if (isSleeping) {
                // Suspended floating screen pointing downwards above sleeping model
                screenshotMesh.position.set(0.9, 0.84, -0.2);
                screenshotMesh.rotation.set(-Math.PI / 3.5, 0, 0); 
            } else {
                // Floating panel looking directly back at standard standing posture
                screenshotMesh.position.set(0.0, 1.45, 0.45);
                screenshotMesh.rotation.set(0, Math.PI, 0);
            }
        }

        let currentVrm = null;
        let clock = new THREE.Clock();

        const controlledBones = [
            'hips', 'spine', 'chest', 'upperChest', 'neck', 'head',
            'leftUpperArm', 'leftLowerArm', 'leftHand',
            'rightUpperArm', 'rightLowerArm', 'rightHand',
            'leftUpperLeg', 'leftLowerLeg', 'leftFoot',
            'rightUpperLeg', 'rightLowerLeg', 'rightFoot',
            'leftThumbMetacarpal', 'leftThumbProximal', 'leftThumbDistal',
            'leftIndexProximal', 'leftIndexIntermediate', 'leftIndexDistal',
            'leftMiddleProximal', 'leftMiddleIntermediate', 'leftMiddleDistal',
            'leftRingProximal', 'leftRingIntermediate', 'leftRingDistal',
            'leftLittleProximal', 'leftLittleIntermediate', 'leftLittleDistal',
            'rightThumbMetacarpal', 'rightThumbProximal', 'rightThumbDistal',
            'rightIndexProximal', 'rightIndexIntermediate', 'rightIndexDistal',
            'rightMiddleProximal', 'rightMiddleIntermediate', 'rightMiddleDistal',
            'rightRingProximal', 'rightRingIntermediate', 'rightRingDistal',
            'rightLittleProximal', 'rightLittleIntermediate', 'rightLittleDistal'
        ];

        // Adjusted baseline posture: Arms hang vertically downward (resting A-pose)
        const defaultPose = {
            leftUpperArm: [0, 0, -1.35],
            rightUpperArm: [0, 0, 1.35],
            spine: [-0.05, 0, 0], // Slight forward inclination to prevent stiffness
            neck: [0.05, 0, 0]
        };

        const boneStates = {};
        controlledBones.forEach(boneName => {
            boneStates[boneName] = { current: new THREE.Euler(0,0,0), target: new THREE.Euler(0,0,0) };
            if (boneName === 'hips') {
                boneStates[boneName].currentPos = new THREE.Vector3(0,0,0);
                boneStates[boneName].targetPos = new THREE.Vector3(0,0,0);
            }
        });

        let originalHipsPos = new THREE.Vector3(0, 0, 0);
        let motionQueue = [];
        let currentKeyframe = null;
        let keyframeTime = 0;

        // Promises pipelines to wait on sequence completion
        let motionPromise = Promise.resolve();
        let motionResolver = null;

        // Eye Oculus Look Target system (always projected in front of camera plane)
        const lookTarget = new THREE.Object3D();
        scene.add(lookTarget);

        // Map model's selected grid-focus (0-8) directly into 3D space relative to viewport camera
        function getGridLookAtPosition(gridIndex, targetVec) {
            const gridX = (gridIndex % 3) - 1; // -1 (left), 0 (center), 1 (right)
            const gridY = 1 - Math.floor(gridIndex / 3); // 1 (top), 0 (center), -1 (bottom)

            // Map grid quadrants to slightly subtle normalized screen coordinate values
            const ndcX = gridX * 0.45;
            const ndcY = gridY * 0.35;

            // Project ray from user's current 3D world view camera orientation
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);

            // Locate the target point comfortable distance ahead of the virtual camera (e.g. 4 meters)
            raycaster.ray.at(4.0, targetVec);
        }

        const expressionTargets = {
            happy: 0,
            sad: 0,
            angry: 0,
            surprised: 0,
            relaxed: 0,
            blink: 0,
            blinkLeft: 0,
            blinkRight: 0,
            aa: 0,
            ee: 0,
            ih: 0,
            oo: 0,
            uu: 0,
            browOuterUpLeft: 0,
            browOuterUpRight: 0,
            browInnerUp: 0,
            mouthSmileLeft: 0,
            mouthSmileRight: 0,
            smileIntensity: 0 
        };
        const expressionCurrents = { ...expressionTargets };

        function applyHandState(side, state) {
            const isLeft = side === 'left';
            const sign = isLeft ? 1 : -1;
            const fingers = ['Index', 'Middle', 'Ring', 'Little'];

            if (state === 'fist') {
                // To close the thumb inward/downward toward the palm
                boneStates[side + 'ThumbMetacarpal'].target.set(0, sign * 0.3, -sign * 0.3);
                boneStates[side + 'ThumbProximal'].target.set(0, 0, -sign * 0.5);
                boneStates[side + 'ThumbDistal'].target.set(0, 0, -sign * 0.5);
                // Inverted Sign calculation so fingers curl downward/inward instead of upward
                fingers.forEach(f => {
                    boneStates[side + f + 'Proximal'].target.set(0, 0, -sign * 1.1);
                    boneStates[side + f + 'Intermediate'].target.set(0, 0, -sign * 1.3);
                    boneStates[side + f + 'Distal'].target.set(0, 0, -sign * 1.0);
                });
            } else if (state === 'open') {
                // Open and extend fingers straight outward
                boneStates[side + 'ThumbMetacarpal'].target.set(0, 0, sign * 0.15);
                boneStates[side + 'ThumbProximal'].target.set(0, 0, sign * 0.1);
                boneStates[side + 'ThumbDistal'].target.set(0, 0, sign * 0.1);
                fingers.forEach(f => {
                    boneStates[side + f + 'Proximal'].target.set(0, 0, sign * 0.15);
                    boneStates[side + f + 'Intermediate'].target.set(0, 0, sign * 0.1);
                    boneStates[side + f + 'Distal'].target.set(0, 0, sign * 0.1);
                });
            } else {
                // Soft, natural curved resting hand state
                boneStates[side + 'ThumbMetacarpal'].target.set(0, sign * 0.1, -sign * 0.1);
                boneStates[side + 'ThumbProximal'].target.set(0, 0, -sign * 0.15);
                boneStates[side + 'ThumbDistal'].target.set(0, 0, -sign * 0.15);
                fingers.forEach(f => {
                    boneStates[side + f + 'Proximal'].target.set(0, 0, -sign * 0.2);
                    boneStates[side + f + 'Intermediate'].target.set(0, 0, -sign * 0.2);
                    boneStates[side + f + 'Distal'].target.set(0, 0, -sign * 0.15);
                });
            }
        }

        function applyPoseToTargets(pose) {
            // Apply standard baseline offsets to skeletal joints
            controlledBones.forEach(boneName => {
                const def = defaultPose[boneName] || [0, 0, 0];
                boneStates[boneName].target.set(def[0], def[1], def[2]);
            });
            if (boneStates['hips'].targetPos) boneStates['hips'].targetPos.set(0, 0, 0);

            applyHandState('left', pose.leftHandState || 'rest');
            applyHandState('right', pose.rightHandState || 'rest');

            const toRad = Math.PI / 180;

            // Direct bone array override (in degrees) or traditional parameter mapping for Left Upper Arm
            if (Array.isArray(pose.leftUpperArm) && pose.leftUpperArm.length === 3) {
                boneStates['leftUpperArm'].target.set(
                    pose.leftUpperArm[0] * toRad,
                    pose.leftUpperArm[1] * toRad,
                    pose.leftUpperArm[2] * toRad
                );
            } else {
                const leftArmSwingVal = pose.leftArmSwing !== undefined ? pose.leftArmSwing : (pose.leftArm !== undefined ? pose.leftArm : 0);
                const leftArmOutVal = pose.leftArmOut || 0;
                const leftArmTwistVal = pose.leftArmTwist || 0;
                const leftDefZ = defaultPose['leftUpperArm'] ? defaultPose['leftUpperArm'][2] : -1.35;
                
                // Fixed coordinate mapping: Twist mapped to X, Swing mapped to Y, Outward lift mapped to Z
                boneStates['leftUpperArm'].target.set(
                    leftArmTwistVal * toRad, 
                    leftArmSwingVal * toRad, 
                    leftDefZ + (leftArmOutVal * toRad)
                );
            }

            // Direct bone array override (in degrees) or traditional parameter mapping for Right Upper Arm
            if (Array.isArray(pose.rightUpperArm) && pose.rightUpperArm.length === 3) {
                boneStates['rightUpperArm'].target.set(
                    pose.rightUpperArm[0] * toRad,
                    pose.rightUpperArm[1] * toRad,
                    pose.rightUpperArm[2] * toRad
                );
            } else {
                const rightArmSwingVal = pose.rightArmSwing !== undefined ? pose.rightArmSwing : (pose.rightArm !== undefined ? pose.rightArm : 0);
                const rightArmOutVal = pose.rightArmOut || 0;
                const rightArmTwistVal = pose.rightArmTwist || 0;
                const rightDefZ = defaultPose['rightUpperArm'] ? defaultPose['rightUpperArm'][2] : 1.35;
                
                // Fixed coordinate mapping: Twist mapped to X, Swing mapped to Y (negative for symmetry), Outward lift mapped to Z
                boneStates['rightUpperArm'].target.set(
                    rightArmTwistVal * toRad, 
                    -rightArmSwingVal * toRad, 
                    rightDefZ - (rightArmOutVal * toRad)
                );
            }

            // Left Lower Arm / Forearm handling with internal rotation limit (-180 to 180 degrees)
            if (Array.isArray(pose.leftLowerArm) && pose.leftLowerArm.length === 3) {
                boneStates['leftLowerArm'].target.set(pose.leftLowerArm[0] * toRad, pose.leftLowerArm[1] * toRad, pose.leftLowerArm[2] * toRad);
            } else {
                boneStates['leftLowerArm'].target.set(0, 0, 0);
            }
            if (pose.leftForearmRotate !== undefined) {
                const leftForearmRotVal = Math.max(-180, Math.min(180, pose.leftForearmRotate));
                boneStates['leftLowerArm'].target.y = leftForearmRotVal * toRad;
            }

            // Right Lower Arm / Forearm handling with internal rotation limit (-180 to 180 degrees)
            if (Array.isArray(pose.rightLowerArm) && pose.rightLowerArm.length === 3) {
                boneStates['rightLowerArm'].target.set(pose.rightLowerArm[0] * toRad, pose.rightLowerArm[1] * toRad, pose.rightLowerArm[2] * toRad);
            } else {
                boneStates['rightLowerArm'].target.set(0, 0, 0);
            }
            if (pose.rightForearmRotate !== undefined) {
                const rightForearmRotVal = Math.max(-180, Math.min(180, pose.rightForearmRotate));
                boneStates['rightLowerArm'].target.y = rightForearmRotVal * toRad;
            }

            // Neck / Head tilting with custom Frontal Tilt override (pitch angle, not side lateral)
            if (Array.isArray(pose.neck) && pose.neck.length === 3) {
                boneStates['neck'].target.set(pose.neck[0] * toRad, pose.neck[1] * toRad, pose.neck[2] * toRad);
            } else {
                const def = defaultPose['neck'] || [0.05, 0, 0];
                boneStates['neck'].target.set(def[0], def[1], def[2]);
            }
            if (pose.headFrontalTilt !== undefined) {
                boneStates['neck'].target.x = pose.headFrontalTilt * toRad;
            }

            // Upper leg joint constraints
            const leftLegSwingVal = pose.leftLegSwing !== undefined ? pose.leftLegSwing : (pose.leftLeg !== undefined ? pose.leftLeg : 0);
            boneStates['leftUpperLeg'].target.set(-leftLegSwingVal * toRad, (pose.leftLegTwist || 0) * toRad, -((pose.leftLegOut || 0) * toRad));
            
            const rightLegSwingVal = pose.rightLegSwing !== undefined ? pose.rightLegSwing : (pose.rightLeg !== undefined ? pose.rightLeg : 0);
            boneStates['rightUpperLeg'].target.set(-rightLegSwingVal * toRad, (pose.rightLegTwist || 0) * toRad, ((pose.rightLegOut || 0) * toRad));

            if (pose.leftKnee !== undefined) boneStates['leftLowerLeg'].target.set(pose.leftKnee * toRad, 0, 0);
            if (pose.rightKnee !== undefined) boneStates['rightLowerLeg'].target.set(pose.rightKnee * toRad, 0, 0);
            
            // Fixed Spine Pitch: Inverted sign direction so bodyLean rotates forward (frontwise) instead of backward
            if (pose.bodyLean !== undefined) {
                boneStates['spine'].target.set(-pose.bodyLean * toRad, 0, 0);
            }
            if (pose.hipsY !== undefined) boneStates['hips'].targetPos.set(0, pose.hipsY, 0);

            // Generic fallback skeletal bone targets (array in degrees [X, Y, Z])
            controlledBones.forEach(boneName => {
                const exc = [
                    'leftUpperArm', 'rightUpperArm', 'leftUpperLeg', 'rightUpperLeg', 
                    'leftLowerLeg', 'rightLowerLeg', 'spine', 'hips', 
                    'leftLowerArm', 'rightLowerArm', 'neck'
                ];
                if (pose[boneName] !== undefined && !exc.includes(boneName)) {
                    const rot = pose[boneName];
                    if (Array.isArray(rot) && rot.length === 3) {
                        boneStates[boneName].target.set(rot[0] * toRad, rot[1] * toRad, rot[2] * toRad);
                    }
                }
            });

            // Handle smile intensity morph mapping
            if (pose.smileIntensity !== undefined) {
                expressionTargets.smileIntensity = Math.max(0, Math.min(1.0, pose.smileIntensity));
            } else {
                expressionTargets.smileIntensity = 0;
            }
        }

        // Expanded Sequence player to safely support loops (reps) and hold times (delays) per step
        window.playMotionSequence = function(sequence) {
            if (!Array.isArray(sequence)) return;
            motionQueue = [];

            motionPromise = new Promise((resolve) => {
                motionResolver = resolve;
            });

            sequence.forEach(step => {
                if (!step || typeof step.dur !== 'number') return;
                const reps = Math.max(1, parseInt(step.reps) || 1);
                const delay = Math.max(0, parseFloat(step.delay) || 0);
                const pose = step.pose || {};
                const exprs = step.expressions || {};

                for (let r = 0; r < reps; r++) {
                    // 1. Transition into target pose
                    motionQueue.push({
                        dur: step.dur,
                        pose: pose,
                        expressions: exprs
                    });
                    
                    // 2. Hold target pose during pause/delay
                    if (delay > 0) {
                        motionQueue.push({
                            dur: delay,
                            pose: pose,
                            expressions: exprs
                        });
                    }

                    // 3. Smoothly return to baseline/default posture before repeating
                    if (reps > 1 && r < reps - 1) {
                        motionQueue.push({
                            dur: step.dur,
                            pose: {}, 
                            expressions: {}
                        });
                    }
                }
            });
            currentKeyframe = null;
        };

        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        function setupCamera(vrm) {
            if (vrm.humanoid) {
                const head = vrm.humanoid.getNormalizedBoneNode('head');
                if (head) {
                    const hp = new THREE.Vector3();
                    head.getWorldPosition(hp);
                    camera.position.set(0.0, hp.y + 0.15, 0.85);
                    controls.target.set(0.0, hp.y + 0.15, 0.0);
                    controls.update();

                    if (vrm.lookAt) {
                        vrm.lookAt.target = lookTarget;
                    }
                    return;
                }
            }
        }

        function initAvatarPose() {
            const hipsNode = currentVrm.humanoid.getNormalizedBoneNode('hips');
            if (hipsNode) originalHipsPos.copy(hipsNode.position);

            applyPoseToTargets(defaultPose);
            controlledBones.forEach(boneName => {
                const boneNode = currentVrm.humanoid.getNormalizedBoneNode(boneName);
                if (boneNode) {
                    const state = boneStates[boneName];
                    state.current.copy(state.target);
                    boneNode.rotation.copy(state.target);
                }
            });
        }

        function loadVRM(url) {
            if (currentVrm) {
                scene.remove(currentVrm.scene);
                currentVrm = null;
            }
            loader.load(url, (gltf) => {
                const vrm = gltf.userData.vrm;
                scene.add(vrm.scene);
                currentVrm = vrm;
                vrm.scene.rotation.y = Math.PI;
                setupCamera(vrm);
                initAvatarPose();
            }, undefined, (err) => console.error("VRM Load Error", err));
        }

        loadVRM('./kit.vrm');

        document.getElementById('vrm-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                loadVRM(url);
                toggleSettings();
            }
        });

        let targetRotationY = Math.PI; 
        let expressionTimer = 0;
        let isSpeaking = false;
        let speakProgress = 0;

        function getIdleOffsets() {
            const time = clock.getElapsedTime();
            return {
                spine: [Math.sin(time * 1.2) * 0.015, Math.cos(time * 0.7) * 0.008, 0],
                neck: [Math.sin(time * 0.8) * 0.01, Math.cos(time * 1.1) * 0.015, Math.sin(time * 0.5) * 0.01],
                head: [Math.cos(time * 1.5) * 0.008, Math.sin(time * 0.9) * 0.01, Math.sin(time * 0.4) * 0.005]
            };
        }

        window.speak = function(text, action, customMotion) {
            return new Promise((resolve) => {
                window.speechSynthesis.cancel();
                subtitle.innerText = text;
                subtitle.style.display = 'block';

                // Advanced parsing to divide spoken dialogue into distinct phoneme intervals
                visemeQueue = [];
                const cleanText = text.toLowerCase().replace(/[^a-z ]/g, '');
                for (let i = 0; i < cleanText.length; i++) {
                    const char = cleanText[i];
                    let viseme = 'rest';
                    if (char === 'a') viseme = 'aa';
                    else if (char === 'e') viseme = 'ee';
                    else if (char === 'i' || char === 'y') viseme = 'ih';
                    else if (char === 'o') viseme = 'oo';
                    else if (char === 'u' || char === 'w') viseme = 'uu';
                    else if (char === ' ') viseme = 'rest';
                    visemeQueue.push(viseme);
                }
                visemeTimer = 0;

                if (customMotion) window.playMotionSequence(customMotion);
                else if (action) triggerAction(action);

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.onstart = () => { isSpeaking = true; };
                
                const onEndHandler = () => {
                    isSpeaking = false;
                    subtitle.style.display = 'none';
                    expressionTargets.aa = 0;
                    expressionTargets.ee = 0;
                    expressionTargets.ih = 0;
                    expressionTargets.oo = 0;
                    expressionTargets.uu = 0;
                    resolve(); // Resolves speak pipeline promise
                };

                utterance.onend = onEndHandler;
                utterance.onerror = onEndHandler; // Graceful backup
                window.speechSynthesis.speak(utterance);
            });
        }

        function triggerAction(action) {
            if (action === "SLEEP") {
                isSleeping = true;
                if (currentVrm) {
                    // Position and rotation lying flat sideways correctly on top of mattress
                    currentVrm.scene.position.set(0.9, 0.44, -0.2);
                    currentVrm.scene.rotation.set(-Math.PI / 2, 0, -Math.PI / 4);
                }
            } else {
                // If model switches away from SLEEP action, restore standing posture
                if (isSleeping) {
                    isSleeping = false;
                    if (currentVrm) {
                        currentVrm.scene.position.set(0, 0, 0);
                        currentVrm.scene.rotation.set(0, Math.PI, 0);
                    }
                }
            }

            if (action === "TURN_AROUND") {
                targetRotationY = (targetRotationY === Math.PI) ? 0 : Math.PI;
            } else if (action === "WALK") {
                window.playMotionSequence([
                    { dur: 0.25, pose: { leftLegSwing: -25, rightLegSwing: 25, leftArmSwing: 20, rightArmSwing: -20, leftKnee: 10, rightKnee: 5, hipsY: -0.02, bodyLean: 5 } },
                    { dur: 0.25, pose: { leftLegSwing: 10, rightLegSwing: -10, leftArmSwing: 0, rightArmSwing: 0, leftKnee: 45, rightKnee: 5, hipsY: 0.0, bodyLean: 4 } },
                    { dur: 0.25, pose: { leftLegSwing: 25, rightLegSwing: -25, leftArmSwing: -20, rightArmSwing: 20, leftKnee: 5, rightKnee: 10, hipsY: -0.02, bodyLean: 5 } },
                    { dur: 0.25, pose: { leftLegSwing: -10, rightLegSwing: 10, leftArmSwing: 0, rightArmSwing: 0, leftKnee: 5, rightKnee: 45, hipsY: 0.0, bodyLean: 4 } },
                    { dur: 0.25, pose: { leftLegSwing: -25, rightLegSwing: 25, leftArmSwing: 20, rightArmSwing: -20, leftKnee: 10, rightKnee: 5, hipsY: -0.02, bodyLean: 5 } },
                    { dur: 0.25, pose: { leftLegSwing: 10, rightLegSwing: -10, leftArmSwing: 0, rightArmSwing: 0, leftKnee: 45, rightKnee: 5, hipsY: 0.0, bodyLean: 4 } },
                    { dur: 0.25, pose: { leftLegSwing: 25, rightLegSwing: -25, leftArmSwing: -20, rightArmSwing: 20, leftKnee: 5, rightKnee: 10, hipsY: -0.02, bodyLean: 5 } },
                    { dur: 0.25, pose: { leftLegSwing: -10, rightLegSwing: 10, leftArmSwing: 0, rightArmSwing: 0, leftKnee: 5, rightKnee: 45, hipsY: 0.0, bodyLean: 4 } },
                    { dur: 0.35, pose: {} }
                ]);
            } else if (action === "NOD") {
                window.playMotionSequence([ { dur: 0.2, pose: { neck: [0.22, 0, 0] } }, { dur: 0.2, pose: { neck: [-0.08, 0, 0] } }, { dur: 0.2, pose: {} } ]);
            } else if (action === "SHAKE_HEAD") {
                window.playMotionSequence([{ dur: 0.2, pose: { neck: [0, 0.35, 0] } }, { dur: 0.2, pose: { neck: [0, -0.35, 0] } }, { dur: 0.2, pose: { neck: [0, 0.35, 0] } }, { dur: 0.2, pose: {} }]);
            } else if (action === "WAVE") {
                window.playMotionSequence([
                    { dur: 0.3, pose: { rightArmSwing: 80, rightArmOut: 15, rightHandState: 'open' } },
                    { dur: 0.25, pose: { rightArmSwing: 80, rightArmOut: 15, rightArmTwist: -20, rightHandState: 'open', rightLowerArm: [0, 1.2, 0] } },
                    { dur: 0.25, pose: { rightArmSwing: 80, rightArmOut: 15, rightArmTwist: 20, rightHandState: 'open', rightLowerArm: [0, 0.6, 0] } },
                    { dur: 0.25, pose: { rightArmSwing: 80, rightArmOut: 15, rightArmTwist: -20, rightHandState: 'open', rightLowerArm: [0, 1.2, 0] } },
                    { dur: 0.4, pose: {} }
                ]);
            } else if (action === "ANGRY") {
                window.playMotionSequence([{ dur: 0.4, pose: { bodyLean: 15, leftArmSwing: 40, leftArmOut: -10, leftHandState: 'fist', rightArmSwing: 40, rightArmOut: -10, rightHandState: 'fist' } }, { dur: 1.5, pose: { bodyLean: 15, leftArmSwing: 45, leftArmOut: -12, leftHandState: 'fist', rightArmSwing: 45, rightArmOut: -12, rightHandState: 'fist' } }, { dur: 0.5, pose: {} }]);
            } else if (action === "HUG") {
                window.playMotionSequence([
                    { 
                        dur: 0.5, 
                        pose: { 
                            leftArmSwing: 40, leftArmOut: 50, leftArmTwist: 30, leftForearmRotate: 45,
                            rightArmSwing: 40, rightArmOut: 50, rightArmTwist: -30, rightForearmRotate: 45,
                            bodyLean: 5 
                        } 
                    },
                    { 
                        dur: 1.5, 
                        pose: { 
                            leftArmSwing: 45, leftArmOut: 55, leftArmTwist: 35, leftForearmRotate: 50,
                            rightArmSwing: 45, rightArmOut: 55, rightArmTwist: -35, rightForearmRotate: 50,
                            bodyLean: 5 
                        } 
                    },
                    { dur: 0.5, pose: {} }
                ]);
            } else if (action === "JUMP") {
                // Full spring, airborne pose holding, landing absorption, and return sequence
                window.playMotionSequence([
                    { dur: 0.25, pose: { leftKnee: 40, rightKnee: 40, hipsY: -0.25, bodyLean: 15, leftArmSwing: -20, rightArmSwing: -20 } },
                    { dur: 0.2, pose: { leftKnee: 0, rightKnee: 0, hipsY: 0.45, bodyLean: -5, leftArmSwing: 60, rightArmSwing: 60, leftArmOut: 20, rightArmOut: 20 } },
                    { dur: 0.15, pose: { leftKnee: 15, rightKnee: 15, hipsY: 0.5, bodyLean: 0, leftArmSwing: 40, rightArmSwing: 40 } },
                    { dur: 0.2, pose: { leftKnee: 45, rightKnee: 45, hipsY: -0.28, bodyLean: 18, leftArmSwing: -10, rightArmSwing: -10 } },
                    { dur: 0.3, pose: {} }
                ]);
            } else if (action === "SMILE") { 
                expressionTargets.happy = 1.0;
                expressionTimer = 3.0; 
            } else if (action === "SAD") { 
                expressionTargets.sad = 1.0;
                expressionTimer = 3.0; 
            } else if (action === "ANGRY_EXPR") { 
                expressionTargets.angry = 1.0;
                expressionTimer = 3.0; 
            } else if (action === "TILT_LEFT") {
                window.playMotionSequence([
                    { dur: 0.4, pose: { neck: [0, 0, 0.25] } },
                    { dur: 1.5, pose: { neck: [0, 0, 0.25] } },
                    { dur: 0.4, pose: {} }
                ]);
            } else if (action === "TILT_RIGHT") {
                window.playMotionSequence([
                    { dur: 0.4, pose: { neck: [0, 0, -0.25] } },
                    { dur: 1.5, pose: { neck: [0, 0, -0.25] } },
                    { dur: 0.4, pose: {} }
                ]);
            } else if (action === "SMILE_LEFT") {
                expressionTargets.mouthSmileLeft = 1.0;
                expressionTargets.happy = 0.5;
                expressionTimer = 2.5;
            } else if (action === "SMILE_RIGHT") {
                expressionTargets.mouthSmileRight = 1.0;
                expressionTargets.happy = 0.5;
                expressionTimer = 2.5;
            } else if (action === "OPEN_MOUTH") {
                expressionTargets.aa = 0.9;
                expressionTimer = 2.0;
            } else if (action === "RAISE_RIGHT_BROW") {
                expressionTargets.browOuterUpRight = 1.0;
                expressionTargets.browInnerUp = 0.8;
                expressionTimer = 2.5;
            } else if (action === "RAISE_LEFT_BROW") {
                expressionTargets.browOuterUpLeft = 1.0;
                expressionTargets.browInnerUp = 0.8;
                expressionTimer = 2.5;
            } else if (action === "CLOSE_LEFT_EYE") {
                expressionTargets.blinkLeft = 1.0;
                expressionTimer = 2.0;
            } else if (action === "CLOSE_RIGHT_EYE") {
                expressionTargets.blinkRight = 1.0;
                expressionTimer = 2.0;
            }
        }

        function updateBones(deltaTime) {
            if (!currentVrm) return;

            if (currentKeyframe === null && motionQueue.length > 0) {
                currentKeyframe = motionQueue.shift();
                keyframeTime = 0;
                applyPoseToTargets(currentKeyframe.pose);
            }

            if (currentKeyframe !== null) {
                keyframeTime += deltaTime;
                if (keyframeTime >= currentKeyframe.dur) currentKeyframe = null;
            } else {
                applyPoseToTargets(defaultPose);
                if (motionResolver) {
                    const resolveTemp = motionResolver;
                    motionResolver = null;
                    resolveTemp(); // Resolves motion pipeline promise when complete
                }
            }

            const idle = getIdleOffsets();

            controlledBones.forEach(boneName => {
                const boneNode = currentVrm.humanoid.getNormalizedBoneNode(boneName);
                if (boneNode) {
                    const state = boneStates[boneName];
                    const speed = currentKeyframe ? (1.0 / currentKeyframe.dur) * 1.5 : 3.0;

                    state.current.x = THREE.MathUtils.lerp(state.current.x, state.target.x, deltaTime * speed);
                    state.current.y = THREE.MathUtils.lerp(state.current.y, state.target.y, deltaTime * speed);
                    state.current.z = THREE.MathUtils.lerp(state.current.z, state.target.z, deltaTime * speed);

                    let finalX = state.current.x;
                    let finalY = state.current.y;
                    let finalZ = state.current.z;

                    if (idle[boneName]) {
                        finalX += idle[boneName][0];
                        finalY += idle[boneName][1];
                        finalZ += idle[boneName][2];
                    }

                    boneNode.rotation.set(finalX, finalY, finalZ);

                    if (boneName === 'hips' && state.currentPos) {
                        state.currentPos.x = THREE.MathUtils.lerp(state.currentPos.x, state.targetPos.x, deltaTime * speed);
                        state.currentPos.y = THREE.MathUtils.lerp(state.currentPos.y, state.targetPos.y, deltaTime * speed);
                        state.currentPos.z = THREE.MathUtils.lerp(state.currentPos.z, state.targetPos.z, deltaTime * speed);
                        
                        const hipsIdleY = Math.sin(clock.getElapsedTime() * 1.2) * 0.003;
                        boneNode.position.set(
                            originalHipsPos.x + state.currentPos.x,
                            originalHipsPos.y + state.currentPos.y + hipsIdleY,
                            originalHipsPos.z + state.currentPos.z
                        );
                    }
                }
            });
        }

        function updateExpressions(deltaTime) {
            if (!currentVrm || !currentVrm.expressionManager) return;

            let autoBlink = 0;
            if (expressionTargets.blinkLeft === 0 && expressionTargets.blinkRight === 0) {
                autoBlink = Math.max(0, Math.sin(clock.getElapsedTime() * 2) > 0.98 ? 1 : 0);
            }
            expressionCurrents.blink = THREE.MathUtils.lerp(expressionCurrents.blink, autoBlink, deltaTime * 15.0);

            // Sophisticated Lip Sync tracking
            let targetAa = expressionTargets.aa;
            let targetEe = expressionTargets.ee;
            let targetIh = expressionTargets.ih;
            let targetOo = expressionTargets.oo;
            let targetUu = expressionTargets.uu;

            if (isSpeaking) {
                visemeTimer += deltaTime;
                const charInterval = 0.08; 
                const currentIndex = Math.floor(visemeTimer / charInterval);

                targetAa = 0;
                targetEe = 0;
                targetIh = 0;
                targetOo = 0;
                targetUu = 0;

                if (currentIndex < visemeQueue.length) {
                    const viseme = visemeQueue[currentIndex];
                    const intensity = 0.6 + Math.sin(visemeTimer * 25) * 0.25; 

                    if (viseme === 'aa') targetAa = intensity;
                    else if (viseme === 'ee') targetEe = intensity;
                    else if (viseme === 'ih') targetIh = intensity;
                    else if (viseme === 'oo') targetOo = intensity;
                    else if (viseme === 'uu') targetUu = intensity;
                } else {
                    const mouthOpen = (Math.sin(visemeTimer * 12) + 1.0) / 2.0;
                    targetAa = mouthOpen * 0.4;
                }
            }

            // Slowly blend emotional persistent state values to facial expressions
            let baselineHappy = 0;
            let baselineSad = 0;
            let baselineAngry = 0;

            if (currentEmotionalState === "happy") baselineHappy = 0.55;
            else if (currentEmotionalState === "sad") baselineSad = 0.55;
            else if (currentEmotionalState === "angry") baselineAngry = 0.55;

            // Compute custom smile intensity adjustments dynamically
            let targetSmileLeft = expressionTargets.mouthSmileLeft;
            let targetSmileRight = expressionTargets.mouthSmileRight;
            let targetHappy = expressionTargets.happy;

            if (expressionTargets.smileIntensity > 0) {
                targetSmileLeft = expressionTargets.smileIntensity;
                targetSmileRight = expressionTargets.smileIntensity;
                targetHappy = Math.max(targetHappy, expressionTargets.smileIntensity * 0.5); 
            }

            Object.keys(expressionTargets).forEach(key => {
                let target = expressionTargets[key];
                
                // Route dynamic mouth and custom smile properties
                if (key === 'aa') target = targetAa;
                else if (key === 'ee') target = targetEe;
                else if (key === 'ih') target = targetIh;
                else if (key === 'oo') target = targetOo;
                else if (key === 'uu') target = targetUu;
                else if (key === 'mouthSmileLeft') target = targetSmileLeft;
                else if (key === 'mouthSmileRight') target = targetSmileRight;
                else if (key === 'happy' && expressionTimer <= 0) target = targetHappy || baselineHappy;
                else if (key === 'sad' && expressionTimer <= 0) target = baselineSad;
                else if (key === 'angry' && expressionTimer <= 0) target = baselineAngry;

                expressionCurrents[key] = THREE.MathUtils.lerp(expressionCurrents[key], target, deltaTime * 8.0);
                currentVrm.expressionManager.setValue(key, expressionCurrents[key]);
            });

            if (expressionTimer > 0) {
                expressionTimer -= deltaTime;
                if (expressionTimer <= 0) {
                    expressionTargets.happy = 0;
                    expressionTargets.sad = 0;
                    expressionTargets.angry = 0;
                    expressionTargets.blinkLeft = 0;
                    expressionTargets.blinkRight = 0;
                    expressionTargets.browOuterUpLeft = 0;
                    expressionTargets.browOuterUpRight = 0;
                    expressionTargets.browInnerUp = 0;
                    expressionTargets.mouthSmileLeft = 0;
                    expressionTargets.mouthSmileRight = 0;
                    expressionTargets.aa = 0;
                    expressionTargets.ee = 0;
                    expressionTargets.ih = 0;
                    expressionTargets.oo = 0;
                    expressionTargets.uu = 0;
                }
            }
        }

        const eyePositionScratch = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();

            if (currentVrm) {
                // Dynamically compute the eye gaze vector based on current camera orientation
                getGridLookAtPosition(lastFocusGrid, eyePositionScratch);
                lookTarget.position.lerp(eyePositionScratch, deltaTime * 8.0);

                // Prevent standard standing yaw alignments if avatar is currently sleeping sideways
                if (!isSleeping) {
                    currentVrm.scene.rotation.y = THREE.MathUtils.lerp(currentVrm.scene.rotation.y, targetRotationY, deltaTime * 5.0);
                }

                updateBones(deltaTime);
                updateExpressions(deltaTime);
                currentVrm.update(deltaTime);

                // Position the Avatar Eye Camera directly aligned within the head node
                const headNode = currentVrm.humanoid.getNormalizedBoneNode('head');
                if (headNode) {
                    const headPos = new THREE.Vector3();
                    headNode.getWorldPosition(headPos);

                    const headQuat = new THREE.Quaternion();
                    headNode.getWorldQuaternion(headQuat);

                    // Offset slightly forward/up to clear the internal head geometry to prevent vision clipping
                    const eyeOffset = new THREE.Vector3(0.0, 0.05, 0.1).applyQuaternion(headQuat);
                    eyeCamera.position.copy(headPos).add(eyeOffset);
                    eyeCamera.quaternion.copy(headQuat);
                }
            }

            // Align global camera targets and position offset dynamically based on sleeping state
            if (isSleeping) {
                controls.target.set(0.9, 0.44, -0.2);
                camera.position.set(0.9, 1.2, 1.0); // Side-profile viewing angle directly facing the bed
            } else {
                controls.target.set(0.0, 1.4, 0.0);
            }

            controls.update();

            // Render from correct chosen perspective mode
            const activeCam = document.getElementById('camera-select').value === 'eyes' ? eyeCamera : camera;
            renderer.render(scene, activeCam);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            eyeCamera.aspect = window.innerWidth / window.innerHeight;
            eyeCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
